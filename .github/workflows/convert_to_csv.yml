name: Convert raw files to CSV

on:
  workflow_dispatch:
  workflow_call:

jobs:
  convert-to-csv:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "latest"

      - name: Processing files to csv
        run: |
          mkdir -p data/csv
          uv run python main.py -a

      - name: Commit and push changes
        if: github.ref == 'refs/heads/main'
        run: |
          git status
          git config --local user.email "noreply@github.com"
          git config --local user.name "github-actions[bot]"
          git add data/csv
          if ! git diff-index --quiet HEAD; then
            git commit -m "Converting files to CSV format - $(date +'%Y-%m-%d')"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit"
          fi

  call-update-technology:
    needs: convert-to-csv
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/update_technology.yml
    permissions:
      contents: write
